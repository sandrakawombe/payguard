server:
  port: 8085

spring:
  application:
    name: reconciliation-service

  datasource:
    url: jdbc:postgresql://localhost:5437/payguard_reconciliation
    username: payguard
    password: payguard_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reconciliation-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.LinkedHashMap
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

stripe:
  api-key: sk_test_REPLACE_WITH_YOUR_TEST_KEY

reconciliation:
  batch-size: 100
  cron: "0 0 2 * * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics